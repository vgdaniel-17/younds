<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Younds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
#root{height:100%}

.theme-daylight{--bg:#f0ebe0;--sf:#e8e0d0;--sf2:#ddd5c2;--bd:rgba(80,55,20,.11);--bd2:rgba(80,55,20,.22);--t:#2a1c0a;--t2:#7a5c38;--t3:#b09070;--sb:#e4dccc}
.theme-firelight{--bg:#190d05;--sf:#241408;--sf2:#33200d;--bd:rgba(200,130,50,.1);--bd2:rgba(200,130,50,.22);--t:#f5e5cc;--t2:#c49050;--t3:#7a5028;--sb:#1f1107}
.theme-night{--bg:#0d1118;--sf:#141c28;--sf2:#1c2638;--bd:rgba(80,110,180,.12);--bd2:rgba(80,110,180,.26);--t:#e5ecf5;--t2:#7090b8;--t3:#384868;--sb:#101620}

.app{height:100%;display:flex;flex-direction:column;background:var(--bg);color:var(--t);overflow:hidden}

/* titlebar */
.win-titlebar{height:32px;display:flex;align-items:center;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;user-select:none}
.win-tb-left{display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0}
.win-tb-title{font-size:12px;font-weight:600;color:var(--t)}
.win-tb-sep,.win-tb-sub{font-size:11px;color:var(--t3)}
.win-tb-mid{flex:1;display:flex;align-items:center;justify-content:center}
.tb-tabs{display:flex;gap:2px}
.tb-tab{appearance:none;border:none;background:transparent;font:inherit;font-size:12px;color:var(--t3);padding:4px 12px;border-radius:6px;cursor:default;transition:color .15s,background .15s}
.tb-tab:hover{color:var(--t2);background:var(--bd)}
.tb-tab.is-on{color:var(--t);background:var(--sf2)}
.win-tb-controls{display:flex;align-items:center;flex-shrink:0}
.win-tb-btn{appearance:none;border:none;background:transparent;width:46px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:default;transition:background .12s}
.win-tb-btn:hover{background:var(--bd)}
.win-tb-close:hover{background:#e81123;color:#fff}

/* layout */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* sidebar */
.sidebar{width:220px;background:var(--sb,var(--sf));border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;padding-bottom:12px}
.sidebar[data-density="compact"]{width:180px}
.sidebar[data-density="comfy"]{width:260px}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sb-brand-name{font-size:13px;font-weight:600;color:var(--t);line-height:1.2}
.sb-brand-tag{font-size:10px;color:var(--t3);margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:1px;padding:0 8px}
.sb-item{appearance:none;border:none;background:transparent;font:inherit;font-size:13px;color:var(--t2);height:34px;padding:0 10px;border-radius:7px;cursor:default;display:flex;align-items:center;gap:9px;transition:color .15s,background .15s;text-align:left;width:100%}
.sb-item:hover{color:var(--t);background:var(--bd)}
.sb-item.is-active{color:var(--t);background:var(--sf2);font-weight:500}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:var(--bg);border-radius:999px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sb-section{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:12px 18px 5px}
.sb-recent{display:flex;flex-direction:column;gap:1px;padding:0 8px}
.sb-recent-item{font-size:12px;color:var(--t3);padding:4px 10px;border-radius:6px;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;transition:color .12s}
.sb-recent-item:hover{color:var(--t2)}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-mascot{margin-top:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.sb-mascot-cap{font-size:11px;color:var(--t3);text-align:center;line-height:1.5}

/* main */
.main{flex:1;overflow:hidden;min-width:0;display:flex;flex-direction:column}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:40px;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.main-scroll::-webkit-scrollbar{width:6px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* hero */
.hero{padding:44px 48px 32px}
.hero[data-density="compact"]{padding:24px 32px 20px}
.hero[data-density="comfy"]{padding:60px 56px 44px}
.hero-eyebrow{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em}
.hero-h1{font-family:'Newsreader',Georgia,serif;font-size:26px;font-weight:400;line-height:1.35;color:var(--t);margin-bottom:8px;max-width:560px}
.hero-h1-accent{color:var(--accent);font-style:italic}
.hero-sub{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.6;max-width:480px}

/* searchbar */
.searchbar{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:13px;margin-bottom:14px}
.searchbar-modes{display:flex;gap:3px;margin-bottom:8px}
.mode-btn{appearance:none;border:none;background:transparent;font:inherit;font-size:12px;color:var(--t3);padding:4px 10px;border-radius:7px;cursor:default;display:flex;align-items:center;gap:5px;transition:color .15s,background .15s}
.mode-btn:hover{color:var(--t2);background:var(--bd)}
.mode-btn.is-on{color:var(--t);background:var(--sf2);font-weight:500}
.searchbar-row{display:flex;gap:8px;margin-bottom:10px}
.searchbar-input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;height:38px;display:flex;align-items:center;padding:0 10px;gap:8px;transition:border-color .15s}
.searchbar-input:focus-within{border-color:var(--bd2)}
.searchbar-icon{color:var(--t3);flex-shrink:0;display:flex}
.searchbar-input input{flex:1;background:transparent;border:none;outline:none;font:inherit;font-size:13px;color:var(--t);min-width:0}
.searchbar-input input::placeholder{color:var(--t3)}
.searchbar-clear{appearance:none;border:none;background:transparent;color:var(--t3);cursor:default;display:flex;align-items:center;padding:2px;border-radius:4px}
.searchbar-clear:hover{color:var(--t2)}
.btn-primary{appearance:none;border:none;background:var(--accent);color:var(--bg);font:inherit;font-size:13px;font-weight:600;height:38px;padding:0 16px;border-radius:8px;cursor:default;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.88}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.searchbar-options{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.opt-group{display:flex;align-items:center;gap:7px}
.opt-label{font-size:11px;color:var(--t3);font-weight:500}
.seg{display:flex;gap:2px;background:var(--bg);padding:2px;border-radius:7px;border:1px solid var(--bd)}
.seg-btn{appearance:none;border:none;background:transparent;font:inherit;font-size:11px;font-weight:500;color:var(--t3);padding:3px 8px;border-radius:5px;cursor:default;transition:color .15s,background .15s}
.seg-btn:hover{color:var(--t2)}
.seg-btn.is-on{background:var(--accent);color:var(--bg)}
.opt-spacer{flex:1}
.opt-link{appearance:none;border:none;background:transparent;font:inherit;font-size:11px;color:var(--t3);cursor:default;display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:5px;transition:color .15s}
.opt-link:hover{color:var(--t2);background:var(--bd)}
.hero-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip-label{font-size:12px;color:var(--t3);margin-right:2px}
.hero-chips .chip{appearance:none;border:1px solid var(--bd);background:var(--sf);font:inherit;font-size:12px;color:var(--t2);padding:4px 10px;border-radius:999px;cursor:default;transition:all .15s}
.hero-chips .chip:hover{color:var(--t);border-color:var(--bd2);background:var(--sf2)}

/* downloads */
.downloads{padding:0 48px 24px}
.dl-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.dl-head h2{font-size:13px;font-weight:600;color:var(--t)}
.dl-head-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.dl-sep{opacity:.4}
.dl-list{display:flex;flex-direction:column;gap:5px}
.dl-row{display:flex;align-items:center;gap:11px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;transition:border-color .15s}
.dl-row:hover{border-color:var(--bd2)}
.dl-cover{width:38px;height:38px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.dl-meta{flex:1;min-width:0}
.dl-title{font-size:13px;font-weight:500;color:var(--t);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-artist{color:var(--t2);font-weight:400;margin-left:4px}
.dl-sub{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);margin-bottom:5px;white-space:nowrap;overflow:hidden}
.dl-source{max-width:180px;overflow:hidden;text-overflow:ellipsis}
.dl-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.dl-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.dl-converting .dl-bar-fill{animation:barpulse 1s ease-in-out infinite}
@keyframes barpulse{0%,100%{opacity:.4}50%{opacity:1}}
.dl-done-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);flex-wrap:wrap}
.dl-file-link{appearance:none;border:none;background:transparent;font:inherit;font-size:11px;color:var(--accent);cursor:pointer;padding:0;text-decoration:underline;text-decoration-style:dotted;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.dl-file-link:hover{opacity:.8}
.dl-time{color:var(--t3)}
.dl-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.dl-percent{font-size:12px;font-weight:600;color:var(--t2);min-width:34px;text-align:right}
.dl-icon-btn{appearance:none;border:1px solid var(--bd);background:var(--sf2);color:var(--t2);width:28px;height:28px;border-radius:7px;cursor:default;display:flex;align-items:center;justify-content:center;transition:color .12s,background .12s}
.dl-icon-btn:hover{color:var(--t);background:var(--bd)}
.dl-done{opacity:.82}
.dl-queued{opacity:.7}
.dl-error .dl-title{color:var(--t3);font-weight:400}

/* statusbar */
.statusbar{height:24px;display:flex;align-items:center;background:var(--sf);border-top:1px solid var(--bd);padding:0 12px;flex-shrink:0;gap:16px}
.status-left,.status-mid,.status-right{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.status-mid{flex:1;justify-content:center}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0}

/* bear z animation */
@keyframes youndsZzz{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-5px) scale(1.04);opacity:.9}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
{% raw %}
const { useState, useEffect, useRef, useCallback } = React;

// ─── Bear ─────────────────────────────────────────────────────────────────
function YoundsBear({ size = 120, mood = "sleepy", style }) {
  const mouthCurve = mood === "happy" ? 8 : mood === "curious" ? -2 : 2;
  return (
    <svg viewBox="0 0 200 200" width={size} height={size} style={{ display: "block", ...style }} aria-label="Younds bear">
      <ellipse cx="100" cy="180" rx="62" ry="6" fill="rgba(58,40,24,.18)" />
      <ellipse cx="100" cy="138" rx="58" ry="44" fill="#a07050" />
      <ellipse cx="100" cy="146" rx="42" ry="30" fill="#c89976" />
      <circle cx="48" cy="60" r="20" fill="#8b5e3c" /><circle cx="48" cy="60" r="10" fill="#d4a888" />
      <circle cx="152" cy="60" r="20" fill="#8b5e3c" /><circle cx="152" cy="60" r="10" fill="#d4a888" />
      <circle cx="100" cy="84" r="58" fill="#a07050" />
      <ellipse cx="58" cy="100" rx="10" ry="6" fill="#e8a888" opacity="0.55" />
      <ellipse cx="142" cy="100" rx="10" ry="6" fill="#e8a888" opacity="0.55" />
      <ellipse cx="100" cy="104" rx="28" ry="22" fill="#e8c8a8" />
      <ellipse cx="100" cy="92" rx="7" ry="5" fill="#3a2818" />
      <ellipse cx="100" cy={108 + mouthCurve} rx="8" ry={Math.abs(mouthCurve) + 1.5} fill="none" stroke="#3a2818" strokeWidth="2.5" strokeLinecap="round" />
      <g transform="translate(72,78)">
        <circle r="6" fill="#3a2818" opacity={mood === "sleepy" ? 0 : 1} />
        {mood === "sleepy" && <><ellipse cx="0" cy="2" rx="7" ry="4" fill="#3a2818" /><ellipse cx="0" cy="-1" rx="8" ry="4" fill="#a07050" /></>}
      </g>
      <g transform="translate(128,78)">
        <circle r="6" fill="#3a2818" opacity={mood === "sleepy" ? 0 : 1} />
        {mood === "sleepy" && <><ellipse cx="0" cy="2" rx="7" ry="4" fill="#3a2818" /><ellipse cx="0" cy="-1" rx="8" ry="4" fill="#a07050" /></>}
      </g>
      <ellipse cx="100" cy="130" rx="48" ry="9" fill="#3d5c3a" />
      <ellipse cx="100" cy="129" rx="48" ry="4" fill="#4d7048" />
      <ellipse cx="138" cy="135" rx="6" ry="10" fill="#3d5c3a" />
      <circle cx="58" cy="170" r="14" fill="#8b5e3c" /><circle cx="142" cy="170" r="14" fill="#8b5e3c" />
      <circle cx="58" cy="172" r="6" fill="#d4a888" /><circle cx="142" cy="172" r="6" fill="#d4a888" />
      {mood === "sleepy" && (
        <g opacity="0.6" style={{ animation: "youndsZzz 3s ease-in-out infinite" }}>
          <text x="172" y="40" fontFamily="Newsreader, serif" fontSize="14" fill="#3a2818" fontStyle="italic">z</text>
          <text x="184" y="28" fontFamily="Newsreader, serif" fontSize="11" fill="#3a2818" fontStyle="italic">z</text>
        </g>
      )}
    </svg>
  );
}

function YoundsLogo({ size = 28 }) {
  return (
    <svg viewBox="0 0 64 64" width={size} height={size} style={{ display: "block" }}>
      <rect x="0" y="0" width="64" height="64" rx="14" fill="#3d5c3a" />
      <circle cx="20" cy="22" r="7" fill="#d4a888" />
      <circle cx="44" cy="22" r="7" fill="#d4a888" />
      <circle cx="32" cy="34" r="18" fill="#d4a888" />
      <ellipse cx="32" cy="40" rx="9" ry="7" fill="#f5ecd9" />
      <ellipse cx="32" cy="36" rx="2.5" ry="1.8" fill="#3a2818" />
      <circle cx="26" cy="32" r="1.6" fill="#3a2818" />
      <circle cx="38" cy="32" r="1.6" fill="#3a2818" />
    </svg>
  );
}

// ─── Tweaks panel ──────────────────────────────────────────────────────────
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.85);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;
    border-radius:6px;overflow:hidden;cursor:default;
    box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s,box-shadow .12s}
  .twk-chip:hover{transform:translateY(-1px);box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      panel.style.right = Math.max(8, offsetRef.current.x) + 'px';
      panel.style.bottom = Math.max(8, offsetRef.current.y) + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value} onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

function TweakColor({ label, value, options, onChange }) {
  const key = o => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
              style={{ background: hero }} onClick={() => onChange(o)}>
              {rest.length > 0 && <span>{rest.slice(0, 4).map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

    <section className="hero" data-density={density}>
      <div className="hero-eyebrow"><Icon.Pine s={12} /><span>Cabin · windows open · snow outside</span></div>
      <h1 className="hero-h1">What track shall we bring down from the w<span className="hero-h1-accent">oo</span>ds today?</h1>

      <div className="searchbar">
        <div className="searchbar-modes">
          <button className={`mode-btn ${!isUrl ? "is-on" : ""}`} onClick={() => setMode("search")}><Icon.Search s={14} /> Search</button>
          <button className={`mode-btn ${isUrl ? "is-on" : ""}`} onClick={() => setMode("url")}><Icon.Link s={14} /> Paste URL</button>
        </div>
        <div className="searchbar-row">
          <div className="searchbar-input">

            <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)}

              placeholder={isUrl
                ? "https://www.youtube.com/watch?v=…  or  soundcloud.com/…"

          </div>

}

// ─── Download row ──────────────────────────────────────────────────────────
function DownloadRow({ item, onCancel }) {
  const isDown = item.status === "downloading";
  const isDone = item.status === "done";
  const isQueued = item.status === "queued";
  const isConv = item.status === "converting";
  const isErr = item.status === "error";

  return (
    <div className={`dl-row dl-${item.status}`}>
      <div className="dl-cover" style={{ background: item.cover }}>
        <span>{item.coverEmoji || "♪"}</span>
      </div>
      <div className="dl-meta">
        <div className="dl-title">
          <strong>{item.title}</strong>
          {item.artist && item.artist !== "—" && <span className="dl-artist">— {item.artist}</span>}
        </div>
        <div className="dl-sub">
          <span className="dl-source">{item.source}</span>
          <span className="dl-sep">·</span>
          <span>{item.format}</span>
          {item.quality && <><span className="dl-sep">·</span><span>{item.quality}</span></>}
          {isDown && item.eta && <><span className="dl-sep">·</span><span className="dl-eta">{item.eta}</span></>}
          {isQueued && <><span className="dl-sep">·</span><span>waiting…</span></>}
          {isConv && <><span className="dl-sep">·</span><span>converting…</span></>}
          {isErr && <><span className="dl-sep">·</span><span style={{color:"#e05050"}}>error</span></>}
        </div>
        {(isDown || isQueued || isConv) && (
          <div className="dl-bar">
            <div className="dl-bar-fill" style={{ width: `${item.progress}%`, opacity: isQueued ? 0.4 : 1 }} />
          </div>
        )}
        {isDone && (
          <div className="dl-done-row">
            <Icon.Check s={12} />
            {item.files && item.files.length > 0
              ? item.files.map(f => (
                  <a key={f} className="dl-file-link"
                    href={`/files/${item.sessionId}/${encodeURIComponent(f)}`} download={f}>
                    ↓ {f.length > 34 ? f.slice(0, 31) + "…" : f}
                  </a>
                ))
              : <span>Done</span>}
            {item.doneAt && <><span className="dl-sep">·</span><span className="dl-time">{item.doneAt} ago</span></>}
          </div>
        )}
      </div>
      <div className="dl-actions">
        {isDown && <><span className="dl-percent">{item.progress}%</span><button className="dl-icon-btn" onClick={() => onCancel(item.id)}><Icon.X s={12} /></button></>}
        {isQueued && <button className="dl-icon-btn" onClick={() => onCancel(item.id)}><Icon.X s={12} /></button>}
        {isConv && <span className="dl-percent" style={{fontSize:10}}>conv.</span>}
        {isDone && <><button className="dl-icon-btn" onClick={() => item.files && item.files[0] && window.open(`/files/${item.sessionId}/${encodeURIComponent(item.files[0])}`, '_blank')}><Icon.Play s={12} /></button></>}
        {isErr && <button className="dl-icon-btn" onClick={() => onCancel(item.id)}><Icon.X s={12} /></button>}
      </div>
    </div>
  );
}

function DownloadsList({ items, onCancel }) {
  const active = items.filter(i => i.status === "downloading").length;
  if (!items.length) return null;
  return (
    <section className="downloads">
      <header className="dl-head">
        <h2>In progress & recent</h2>
        <div className="dl-head-meta">
          <span><Icon.Sparkles s={12} /> yt-dlp</span>
          <span className="dl-sep">·</span>
          <span>{active} active</span>
        </div>
      </header>
      <div className="dl-list">
        {items.map(it => <DownloadRow key={it.id} item={it} onCancel={onCancel} />)}
      </div>
    </section>
  );
}

// ─── Status bar ────────────────────────────────────────────────────────────
function StatusBar({ items }) {
  const active = items.filter(i => i.status === "downloading").length;
  const done = items.filter(i => i.status === "done").length;
  return (
    <div className="statusbar">
      <div className="status-left"><span className="status-dot" /> Connected · forest online</div>
      <div className="status-mid">
        {active > 0
          ? <>{active} download{active === 1 ? "" : "s"} in progress</>
          : done > 0 ? <>{done} track{done === 1 ? "" : "s"} in library</>
          : <>All quiet. The bear is dozing.</>}
      </div>
      <div className="status-right"><span>Younds v2.0 · yt-dlp</span></div>
    </div>
  );
}

// ─── Tweak defaults ────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { theme: "daylight", density: "regular", mascot: "regular", accent: "#c98a4a" };

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState("search");
  const [query, setQuery] = useState("");
  const [mode, setMode] = useState("url");
  const [format, setFormat] = useState("MP3");
  const [quality, setQuality] = useState("320");
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);

  const openTweaks = () => window.postMessage({ type: '__activate_edit_mode' }, '*');

  const submit = async () => {
    const q = query.trim();
    if (!q || loading) return;

    const rawUrl = mode === "search" ? `ytsearch1:${q}` : q;
    const fmt = format.toLowerCase();
    const newId = Date.now();
    const newItem = {
      id: newId,
      status: "queued",
      progress: 0,
      title: mode === "url" ? "Loading…" : q.split(" ").slice(0, 4).join(" "),
      artist: "",
      source: mode === "url" ? q.slice(0, 45) : "YouTube search",
      format: format,
      quality: format === "FLAC" ? "lossless" : `${quality} kbps`,
      cover: "linear-gradient(135deg,#3d5c3a,#a07050)",
      coverEmoji: "♪",
      sessionId: null,
      files: [],
      doneAt: null,
    };

    setItems(cur => [newItem, ...cur]);
    setQuery("");
    setLoading(true);

    try {
      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ urls: rawUrl, mode: "audio", quality: format === "FLAC" ? "0" : quality, fmt }),
      });
      const data = await res.json();
      if (data.error) {
        setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "error", title: data.error } : it));
        setLoading(false);
        return;
      }
      const sid = data.session_id;
      setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "downloading", sessionId: sid } : it));
      setLoading(false);

      const es = new EventSource(`/stream/${sid}`);
      es.onmessage = ({ data: raw }) => {
        const d = JSON.parse(raw);
        if (d.type === "ping") return;
        if (d.type === "progress") {
          setItems(cur => cur.map(it => it.id === newId ? {
            ...it, status: "downloading",
            progress: Math.round(d.pct),
            title: d.title || it.title,
            eta: d.eta ? `ETA ${d.eta}` : it.eta,
          } : it));
        }
        if (d.type === "converting") {
          setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "converting", progress: 99 } : it));
        }
        if (d.type === "done") {
          es.close();
          setItems(cur => cur.map(it => it.id === newId ? {
            ...it, status: "done", progress: 100,
            doneAt: "just now", files: d.files || [], sessionId: sid,
            title: it.title === "Loading…" && d.files && d.files[0] ? d.files[0].replace(/\.[^.]+$/, '') : it.title,
          } : it));
        }
        if (d.type === "error") {
          es.close();
          setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "error", title: d.msg || "Error" } : it));
        }
      };
      es.onerror = () => { es.close(); setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "error", title: "Connection lost" } : it)); };
    } catch {
      setItems(cur => cur.map(it => it.id === newId ? { ...it, status: "error", title: "Could not connect to server" } : it));
      setLoading(false);
    }
  };

  const onCancel = (id) => setItems(cur => cur.filter(it => it.id !== id));

  return (
    <div className={`app theme-${t.theme}`} style={{ "--accent": t.accent }}>
      <WinChrome onOpenTweaks={openTweaks}>
        <div className="tb-tabs">
          <button className="tb-tab is-on">Studio</button>
          <button className="tb-tab">Library</button>
          <button className="tb-tab">Journal</button>
        </div>
      </WinChrome>

      <div className="app-body">
        <Sidebar active={active} onChange={setActive} density={t.density} mascot={t.mascot} onOpenTweaks={openTweaks} />
        <main className="main">
          <div className="main-scroll">
            <SearchHero
              query={query} setQuery={setQuery} onSubmit={submit}
              mode={mode} setMode={setMode}
              format={format} setFormat={setFormat}
              quality={quality} setQuality={setQuality}
              density={t.density} loading={loading}
            />
            <DownloadsList items={items} onCancel={onCancel} />
          </div>
        </main>
      </div>

      <StatusBar items={items} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Atmosphere" />
        <TweakRadio label="Theme" value={t.theme} options={["daylight","firelight","night"]} onChange={v => setTweak("theme", v)} />
        <TweakColor label="Accent" value={t.accent} options={["#c98a4a","#3d5c3a","#a05c4a","#5a6c8a"]} onChange={v => setTweak("accent", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={["compact","regular","comfy"]} onChange={v => setTweak("density", v)} />
        <TweakSection label="Mascot" />
        <TweakRadio label="Bear" value={t.mascot} options={["off","regular","big"]} onChange={v => setTweak("mascot", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
{% endraw %}
</script>
