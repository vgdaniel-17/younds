<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Younds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0C0C0C;
  --card:    #161616;
  --border:  #242424;
  --border2: #333;
  --accent:  #C8FF00;
  --acc2:    #9BBF00;
  --text:    #EFEFEF;
  --sub:     #777;
  --muted:   #3A3A3A;
  --error:   #FF453A;
  --warn:    #FF9F0A;
  --r:       14px;
  --r-sm:    9px;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  scrollbar-width: none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 64px 28px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Logo ── */
.logo {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 28px;
}
.logo em { color: var(--accent); font-style: normal; }

/* ── URL box ── */
.url-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  transition: border-color .15s;
}
.url-wrap:focus-within { border-color: var(--border2); }

.url-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  gap: 8px;
}
.url-hint { font-size: 12px; color: var(--muted); }
.import-btn {
  font-size: 12px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: none;
  white-space: nowrap;
  transition: all .15s;
  flex-shrink: 0;
}
.import-btn:hover { border-color: var(--border2); color: var(--text); }

textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.75;
  resize: none;
  min-height: 96px;
}
textarea::placeholder { color: var(--muted); }
textarea::-webkit-scrollbar { display: none; }
textarea { scrollbar-width: none; }

/* ── Format row ── */
.fmt-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.fmt-btn {
  height: 48px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--sub);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  letter-spacing: -.1px;
}
.fmt-btn:hover { border-color: var(--border2); color: var(--text); }
.fmt-btn.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #0C0C0C;
}

/* ── Folder row ── */
.folder-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 48px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.folder-label {
  font-size: 13px;
  color: var(--sub);
  flex-shrink: 0;
}
.folder-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Inter', monospace;
  font-size: 13px;
  min-width: 0;
}
.folder-input::placeholder { color: var(--muted); }

/* ── Quality ── */
.q-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.q-label { font-size: 13px; color: var(--sub); flex-shrink: 0; margin-right: 4px; }

.chip {
  flex: 1;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--sub);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.on { background: var(--accent); border-color: var(--accent); color: #0C0C0C; }
.chip:disabled { opacity: .25; cursor: not-allowed; }

/* ── Download button ── */
.dl-btn {
  width: 100%;
  height: 54px;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #0C0C0C;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: -.1px;
  transition: background .15s, transform .1s;
  margin-top: 2px;
}
.dl-btn:hover:not(:disabled) { background: var(--acc2); }
.dl-btn:active:not(:disabled) { transform: scale(.99); }
.dl-btn:disabled { background: var(--card); color: var(--muted); cursor: not-allowed; border: 1px solid var(--border); }

/* ── Progress ── */
.prog-box {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
}
.prog-box.show { display: block; }

.prog-name {
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 18px;
}

.bar-bg {
  height: 3px;
  background: var(--muted);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0;
  transition: width .35s ease;
}
.bar-fill.pulse {
  width: 35%;
  animation: pulse 1.3s ease-in-out infinite;
}
@keyframes pulse {
  0%   { transform: translateX(-120%); }
  100% { transform: translateX(380%); }
}

.prog-meta {
  display: flex;
  gap: 16px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
}

.prog-status {
  margin-top: 10px;
  font-size: 13px;
  color: var(--sub);
  min-height: 18px;
}
.prog-status.ok   { color: var(--accent); }
.prog-status.err  { color: var(--error); }
.prog-status.warn { color: var(--warn); }

/* ── Files ── */
.files-box {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.files-box.show { display: block; }

.files-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.files-head span { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; }
.ttl { font-size: 11px; color: var(--muted); }
.ttl.exp { color: var(--error); }

.file-row {
  display: flex;
  align-items: center;
  padding: 13px 18px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  transition: background .12s;
}
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: rgba(255,255,255,.02); }

.file-icon { font-size: 16px; flex-shrink: 0; }
.file-name { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-dl   { font-size: 12px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

/* ── Spinner ── */
.spin {
  width: 17px; height: 17px;
  border: 2px solid rgba(0,0,0,.2);
  border-top-color: #0C0C0C;
  border-radius: 50%;
  animation: rot .65s linear infinite;
  display: none;
}
@keyframes rot { to { transform: rotate(360deg); } }
.dl-btn.loading .spin { display: block; }

/* ── Footer ── */
footer { text-align: center; font-size: 11px; color: var(--muted); padding-top: 32px; }
</style>
</head>
<body>
<div class="page">

  <div class="logo">YOU<em>NDS</em></div>

  <!-- URL -->
  <div class="url-wrap">
    <textarea id="urls" placeholder="Lipește unul sau mai multe linkuri, câte unul pe linie&#10;&#10;https://youtube.com/watch?v=...&#10;https://youtube.com/playlist?list=..." spellcheck="false"></textarea>
    <div class="url-actions">
      <span class="url-hint">YouTube · Facebook · Playlist-uri · un link per linie</span>
      <label class="import-btn" title="Importă un fișier .txt cu linkuri">
        <input type="file" id="txt-import" accept=".txt" onchange="importTxt(this)" style="display:none">
        ↑ Import .txt
      </label>
    </div>
  </div>

  <!-- Folder -->
  <div class="folder-row">
    <span class="folder-label">📁</span>
    <input class="folder-input" id="out-dir" type="text" placeholder="Folder de salvare (ex: /home/user/Muzică)" spellcheck="false">
  </div>

  <!-- Format -->
  <div class="fmt-row">
    <button class="fmt-btn on" id="btn-audio" onclick="setMode('audio')">♪ &nbsp;MP3 Audio</button>
    <button class="fmt-btn"    id="btn-video" onclick="setMode('video')">▶ &nbsp;MP4 Video</button>
  </div>

  <!-- Quality -->
  <div class="q-row" id="q-row">
    <span class="q-label">Calitate</span>
    <button class="chip"    data-q="128" onclick="setQ('128')">128k</button>
    <button class="chip"    data-q="192" onclick="setQ('192')">192k</button>
    <button class="chip"    data-q="256" onclick="setQ('256')">256k</button>
    <button class="chip on" data-q="320" onclick="setQ('320')">320k</button>
  </div>

  <!-- Button -->
  <button class="dl-btn" id="dl-btn" onclick="go()">
    <span class="spin"></span>
    <span id="btn-lbl">↓&nbsp; Descarcă</span>
  </button>

  <!-- Progress -->
  <div class="prog-box" id="prog-box">
    <div class="prog-name" id="prog-name"></div>
    <div class="bar-bg"><div class="bar-fill pulse" id="bar"></div></div>
    <div class="prog-meta">
      <span id="m-pct"></span>
      <span id="m-spd"></span>
      <span id="m-eta"></span>
    </div>
    <div class="prog-status" id="prog-status"></div>
  </div>

  <!-- Files -->
  <div class="files-box" id="files-box">
    <div class="files-head">
      <span>Descărcate</span>
      <span class="ttl" id="ttl"></span>
    </div>
    <div id="files-list"></div>
  </div>

</div>

<footer>Younds v2 &nbsp;·&nbsp; yt-dlp</footer>

<script>
let mode = 'audio', q = '320';
let ttlTimer = null;
const TTL = 3600;

function setMode(m) {
  mode = m;
  document.getElementById('btn-audio').classList.toggle('on', m === 'audio');
  document.getElementById('btn-video').classList.toggle('on', m === 'video');
  document.querySelectorAll('.chip').forEach(c =>
    m === 'audio' ? c.removeAttribute('disabled') : c.setAttribute('disabled', ''));
  document.getElementById('q-row').style.opacity = m === 'audio' ? '1' : '.4';
}

function setQ(v) {
  q = v;
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('on', c.dataset.q === v));
}

async function go() {
  const urls = document.getElementById('urls').value.trim();
  if (!urls) { document.getElementById('urls').focus(); return; }

  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('btn-lbl').textContent = 'Se pregătește…';

  show('prog-box');
  hide('files-box');
  document.getElementById('files-list').innerHTML = '';
  document.getElementById('bar').className = 'bar-fill pulse';
  document.getElementById('bar').style.width = '';
  document.getElementById('prog-name').textContent = '';
  document.getElementById('m-pct').textContent = '';
  document.getElementById('m-spd').textContent = '';
  document.getElementById('m-eta').textContent = '';
  status('', '');

  try {
    const r = await fetch('/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls, mode, quality: q, out_dir: document.getElementById('out-dir').value.trim() }),
    });
    if (!r.ok) { fail('Eroare server (' + r.status + ')'); return; }
    let d;
    try { d = await r.json(); } catch { fail('Răspuns invalid de la server.'); return; }
    if (d.error) { fail(d.error); return; }
    listen(d.session_id);
  } catch(e) { fail('Nu s-a putut conecta la server.'); }
}

function listen(sid) {
  const es = new EventSource('/stream/' + sid);
  es.onmessage = ({ data }) => {
    const d = JSON.parse(data);
    if (d.type === 'ping') return;
    if (d.type === 'progress') {
      const bar = document.getElementById('bar');
      bar.className = 'bar-fill';
      bar.style.width = d.pct + '%';
      if (d.title) document.getElementById('prog-name').textContent = d.title;
      document.getElementById('m-pct').textContent = d.pct.toFixed(0) + '%';
      document.getElementById('m-spd').textContent = d.speed;
      document.getElementById('m-eta').textContent = d.eta ? 'ETA ' + d.eta : '';
    }
    if (d.type === 'converting') {
      status('Conversie audio…', 'warn');
      document.getElementById('bar').className = 'bar-fill pulse';
      document.getElementById('bar').style.width = '';
    }
    if (d.type === 'error') status(d.msg, 'err');
    if (d.type === 'done') {
      es.close();
      reset();
      document.getElementById('bar').className = 'bar-fill';
      document.getElementById('bar').style.width = '100%';
      if (d.files && d.files.length) {
        const where = d.saved_to ? ' → ' + d.saved_to : '';
        status('Gata! ' + d.files.length + ' fișier(e).' + where, 'ok');
        showFiles(sid, d.files);
      } else {
        status('Finalizat.', '');
      }
    }
  };
  es.onerror = () => { es.close(); fail('Conexiune pierdută.'); };
}

function showFiles(sid, files) {
  const list = document.getElementById('files-list');
  list.innerHTML = '';
  const ext = f => f.split('.').pop().toLowerCase();
  const icon = f => ({ mp3: '♪', mp4: '▶', m4a: '♪', webm: '▶' }[ext(f)] || '·');
  files.forEach(f => {
    const a = document.createElement('a');
    a.className = 'file-row';
    a.href = `/files/${sid}/${encodeURIComponent(f)}`;
    a.download = f;
    a.innerHTML = `<span class="file-icon">${icon(f)}</span><span class="file-name">${esc(f)}</span><span class="file-dl">↓ Descarcă</span>`;
    list.appendChild(a);
  });
  show('files-box');
  startTtl();
}

function startTtl() {
  if (ttlTimer) clearInterval(ttlTimer);
  const exp = Date.now() + TTL * 1000;
  const el = document.getElementById('ttl');
  ttlTimer = setInterval(() => {
    const s = Math.max(0, Math.floor((exp - Date.now()) / 1000));
    if (s === 0) {
      clearInterval(ttlTimer);
      el.textContent = 'Expirat';
      el.className = 'ttl exp';
      document.querySelectorAll('.file-row').forEach(r => { r.style.opacity='.35'; r.style.pointerEvents='none'; });
      return;
    }
    el.textContent = `Expiră în ${fmt(s)}`;
  }, 1000);
}

function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function show(id) { document.getElementById(id).classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }
function status(msg, cls) { const el = document.getElementById('prog-status'); el.textContent = msg; el.className = 'prog-status ' + cls; }
function reset() { const btn = document.getElementById('dl-btn'); btn.disabled = false; btn.classList.remove('loading'); document.getElementById('btn-lbl').textContent = '↓  Descarcă'; }
function fail(msg) { reset(); status(msg, 'err'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function importTxt(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'));
    const ta = document.getElementById('urls');
    const existing = ta.value.trim();
    ta.value = existing ? existing + '\n' + lines.join('\n') : lines.join('\n');
    ta.focus();
  };
  reader.readAsText(file);
  input.value = '';
}
</script>
</body>
</html>
