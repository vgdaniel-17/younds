<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Younds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0A0A0A;
  --surface:   #141414;
  --surface2:  #1E1E1E;
  --border:    #272727;
  --border2:   #333;
  --accent:    #C8FF00;
  --accent-dim:#9BBF00;
  --text:      #F0F0F0;
  --text-2:    #888;
  --text-3:    #444;
  --error:     #FF453A;
  --warn:      #FF9F0A;
  --radius:    12px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Layout ── */
.page {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 16px 64px;
  gap: 0;
}

.wrap {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Header ── */
header {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }

.badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.3px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ── URL input ── */
.url-area {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.7;
  resize: none;
  min-height: 112px;
}
.url-area::placeholder { color: var(--text-3); }

.url-hint {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.url-hint span::before { content: "·  "; }

/* ── Format toggle ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.toggle-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 44px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-2);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
}
.toggle-btn:hover { border-color: var(--border2); color: var(--text); }
.toggle-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0A0A0A;
}

.toggle-btn .icon { font-size: 16px; }

/* ── Quality chips ── */
.quality-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.q-label {
  font-size: 12px;
  color: var(--text-2);
  margin-right: 4px;
  white-space: nowrap;
}

.chip {
  height: 30px;
  padding: 0 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-2);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0A0A0A;
}
.chip:disabled, .chip[disabled] {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ── Advanced collapsible ── */
.adv-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--text-3);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.3px;
  transition: color 0.15s;
}
.adv-toggle:hover { color: var(--text-2); }
.adv-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s ease;
  font-size: 10px;
}
.adv-toggle.open .arrow { transform: rotate(90deg); }

.adv-body {
  display: none;
  flex-direction: column;
  gap: 14px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.adv-body.open { display: flex; }

.field-label {
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 6px;
  font-weight: 500;
}

.field-row {
  display: flex;
  gap: 8px;
}

input[type="text"], input[type="number"] {
  flex: 1;
  height: 38px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Inter', monospace;
  font-size: 13px;
  padding: 0 12px;
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--border2);
}
input::placeholder { color: var(--text-3); }

.small-btn {
  height: 38px;
  padding: 0 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.small-btn:hover { border-color: var(--border2); color: var(--text); }

input[type="number"] {
  width: 80px;
  flex: none;
}
.field-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 5px;
}

/* ── Download button ── */
.dl-btn {
  width: 100%;
  height: 52px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #0A0A0A;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.2px;
  transition: background 0.15s, transform 0.1s;
}
.dl-btn:hover { background: var(--accent-dim); }
.dl-btn:active { transform: scale(0.99); }
.dl-btn:disabled {
  background: var(--surface2);
  color: var(--text-3);
  cursor: not-allowed;
  transform: none;
}

/* ── Progress ── */
.progress-card {
  display: none;
}
.progress-card.visible {
  display: block;
}

.progress-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.progress-bar-bg {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
}

.progress-bar-fill.indeterminate {
  width: 40%;
  animation: indeterminate 1.4s ease-in-out infinite;
}

@keyframes indeterminate {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-3);
}

.status-msg {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 10px;
}
.status-msg.success { color: var(--accent); }
.status-msg.error   { color: var(--error); }
.status-msg.warn    { color: var(--warn); }

/* ── Files ── */
.files-section {
  display: none;
}
.files-section.visible { display: block; }

.files-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.file-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-decoration: none;
  transition: border-color 0.15s;
}
.file-item:hover { border-color: var(--border2); }

.file-name {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.file-dl {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  letter-spacing: 0.3px;
}

/* ── Log ── */
.log-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--text-3);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  padding: 0;
  transition: color 0.15s;
  width: 100%;
}
.log-toggle:hover { color: var(--text-2); }
.log-toggle .arrow {
  transition: transform 0.2s;
  font-size: 10px;
}
.log-toggle.open .arrow { transform: rotate(90deg); }

.log-body {
  display: none;
  margin-top: 12px;
}
.log-body.open { display: block; }

.log-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 11.5px;
  color: var(--text-3);
  min-height: 80px;
  max-height: 180px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}

/* ── Footer ── */
footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  padding: 24px 16px;
}

/* ── Spinner ── */
@keyframes spin {
  to { transform: rotate(360deg); }
}
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(10,10,10,0.2);
  border-top-color: #0A0A0A;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.dl-btn.loading .spinner { display: block; }
.dl-btn.loading .btn-text { opacity: 0.7; }
</style>
</head>

<body>
<div class="page">
  <header>
    <div class="logo">YOU<span>NDS</span></div>
    <div class="badge">downloader</div>
  </header>

  <div class="wrap">

    <!-- URL -->
    <div class="card">
      <textarea
        id="urls"
        class="url-area"
        placeholder="Lipește linkuri aici — câte unul pe linie&#10;&#10;https://youtube.com/watch?v=...&#10;https://youtube.com/playlist?list=..."
        spellcheck="false"
      ></textarea>
      <div class="url-hint">
        <span>YouTube</span>
        <span>Facebook</span>
        <span>Playlist-uri</span>
        <span>Un link per linie</span>
      </div>
    </div>

    <!-- Format -->
    <div class="card">
      <div class="section-label">Format</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-audio" onclick="setMode('audio')">
          <span class="icon">♪</span> MP3 Audio
        </button>
        <button class="toggle-btn" id="btn-video" onclick="setMode('video')">
          <span class="icon">▶</span> MP4 Video
        </button>
      </div>
      <div class="quality-row" id="quality-row">
        <span class="q-label">Calitate</span>
        <button class="chip" data-q="128" onclick="setQuality('128')">128k</button>
        <button class="chip" data-q="192" onclick="setQuality('192')">192k</button>
        <button class="chip" data-q="256" onclick="setQuality('256')">256k</button>
        <button class="chip active" data-q="320" onclick="setQuality('320')">320k</button>
      </div>
    </div>

    <!-- Advanced -->
    <div class="card">
      <button class="adv-toggle" id="adv-toggle" onclick="toggleAdv()">
        <span class="arrow">▶</span> Setări avansate
      </button>
      <div class="adv-body" id="adv-body">
        <div>
          <div class="field-label">Folder ieșire</div>
          <div class="field-row">
            <input type="text" id="out-dir" value="/tmp/younds_downloads">
          </div>
        </div>
        <div>
          <div class="field-label">FFmpeg</div>
          <div class="field-row">
            <input type="text" id="ffmpeg-path" value="/usr/bin/ffmpeg" style="font-family:monospace">
            <button class="small-btn" onclick="pickFile('ffmpeg-path')">Alege</button>
          </div>
        </div>
        <div>
          <div class="field-label">Cookies (opțional)</div>
          <div class="field-row">
            <input type="text" id="cookies" placeholder="Lasă gol dacă nu e nevoie">
            <button class="small-btn" onclick="pickFile('cookies')">Alege</button>
          </div>
        </div>
        <div>
          <div class="field-label">Index numerotare</div>
          <div class="field-row">
            <input type="number" id="start-index" value="0" min="0">
          </div>
          <div class="field-hint">0 = fără număr  ·  12 → "12 - Titlu.mp3", "13 - Titlu.mp3"…</div>
        </div>
      </div>
    </div>

    <!-- Download button -->
    <button class="dl-btn" id="dl-btn" onclick="startDownload()">
      <span class="spinner"></span>
      <span class="btn-text">↓  Descarcă</span>
    </button>

    <!-- Progress -->
    <div class="card progress-card" id="progress-card">
      <div class="progress-title" id="progress-title">Se pregătește…</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill indeterminate" id="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-pct">—</span>
        <span id="progress-speed">—</span>
        <span id="progress-eta">—</span>
      </div>
      <div class="status-msg" id="status-msg"></div>
    </div>

    <!-- Files -->
    <div class="card files-section" id="files-section">
      <div class="section-label">Fișiere descărcate</div>
      <div class="files-list" id="files-list"></div>
    </div>

    <!-- Log -->
    <div class="card">
      <button class="log-toggle" id="log-toggle" onclick="toggleLog()">
        <span class="arrow">▶</span> Log
        <span style="margin-left:auto;font-size:11px;color:var(--text-3)" id="log-count"></span>
      </button>
      <div class="log-body" id="log-body">
        <div class="log-box" id="log-box"></div>
      </div>
    </div>

  </div>
</div>

<footer>Younds v2.0 &nbsp;·&nbsp; yt-dlp</footer>

<script>
let mode = 'audio';
let quality = '320';
let currentSid = null;
let logLines = 0;

function setMode(m) {
  mode = m;
  document.getElementById('btn-audio').classList.toggle('active', m === 'audio');
  document.getElementById('btn-video').classList.toggle('active', m === 'video');
  const chips = document.querySelectorAll('.chip');
  chips.forEach(c => m === 'audio' ? c.removeAttribute('disabled') : c.setAttribute('disabled',''));
}

function setQuality(q) {
  quality = q;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.q === q);
  });
}

function toggleAdv() {
  const toggle = document.getElementById('adv-toggle');
  const body = document.getElementById('adv-body');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleLog() {
  const toggle = document.getElementById('log-toggle');
  const body = document.getElementById('log-body');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

function pickFile(fieldId) {
  // Browser file picker not available — show note
  const input = document.getElementById(fieldId);
  input.focus();
  input.select();
}

function log(msg) {
  const box = document.getElementById('log-box');
  box.textContent += msg + '\n';
  box.scrollTop = box.scrollHeight;
  logLines++;
  document.getElementById('log-count').textContent = logLines + ' linii';
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg ' + cls;
}

function setProgress(pct) {
  const fill = document.getElementById('progress-fill');
  fill.classList.remove('indeterminate');
  fill.style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct.toFixed(0) + '%';
}

async function startDownload() {
  const urls = document.getElementById('urls').value.trim();
  if (!urls) {
    document.getElementById('urls').focus();
    return;
  }

  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Se pregătește…';

  document.getElementById('progress-card').classList.add('visible');
  document.getElementById('files-section').classList.remove('visible');
  document.getElementById('files-list').innerHTML = '';
  document.getElementById('progress-fill').className = 'progress-bar-fill indeterminate';
  document.getElementById('progress-pct').textContent = '—';
  document.getElementById('progress-speed').textContent = '—';
  document.getElementById('progress-eta').textContent = '—';
  document.getElementById('progress-title').textContent = 'Se pregătește…';
  setStatus('');

  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls, mode, quality }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }

    currentSid = data.session_id;
    listenStream(currentSid);
  } catch (e) {
    showError('Eroare rețea: ' + e.message);
  }
}

function listenStream(sid) {
  const es = new EventSource('/stream/' + sid);

  es.onmessage = (ev) => {
    const d = JSON.parse(ev.data);

    if (d.type === 'ping') return;

    if (d.type === 'progress') {
      setProgress(d.pct);
      if (d.title) document.getElementById('progress-title').textContent = d.title;
      if (d.speed) document.getElementById('progress-speed').textContent = d.speed;
      if (d.eta)   document.getElementById('progress-eta').textContent = 'ETA ' + d.eta;
      log(`  ${d.pct.toFixed(0)}%  ·  ${d.speed}  ·  ETA ${d.eta}`);
    }

    if (d.type === 'converting') {
      setStatus('Conversie audio…', 'warn');
      document.getElementById('progress-fill').className = 'progress-bar-fill indeterminate';
      log('  ✓ Descărcat, procesare…');
    }

    if (d.type === 'error') {
      log('  ✗ ' + d.msg);
      setStatus('Eroare: ' + d.msg, 'error');
    }

    if (d.type === 'done') {
      es.close();
      const btn = document.getElementById('dl-btn');
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.querySelector('.btn-text').textContent = '↓  Descarcă';

      document.getElementById('progress-fill').classList.remove('indeterminate');
      document.getElementById('progress-fill').style.width = '100%';

      if (d.files && d.files.length > 0) {
        setStatus('Gata! ' + d.files.length + ' fișier(e) descărcat(e).', 'success');
        showFiles(sid, d.files);
        log('  ✓ Gata! ' + d.files.length + ' fișier(e)');
      } else {
        setStatus('Finalizat.', '');
        log('  ✓ Finalizat.');
      }
    }
  };

  es.onerror = () => {
    es.close();
    showError('Conexiune pierdută.');
  };
}

function showFiles(sid, files) {
  const section = document.getElementById('files-section');
  const list = document.getElementById('files-list');
  list.innerHTML = '';
  files.forEach(f => {
    const a = document.createElement('a');
    a.className = 'file-item';
    a.href = `/files/${sid}/${encodeURIComponent(f)}`;
    a.download = f;
    a.innerHTML = `
      <span class="file-name">${escHtml(f)}</span>
      <span class="file-dl">↓ Descarcă</span>
    `;
    list.appendChild(a);
  });
  section.classList.add('visible');
}

function showError(msg) {
  const btn = document.getElementById('dl-btn');
  btn.disabled = false;
  btn.classList.remove('loading');
  btn.querySelector('.btn-text').textContent = '↓  Descarcă';
  setStatus(msg, 'error');
  log('  ✗ ' + msg);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
